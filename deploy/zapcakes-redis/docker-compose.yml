services:
  redis:
    image: redis:7-alpine
    container_name: zapcakes-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 300 10
      --save 60 100
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - default

volumes:
  redis_data:
