services:
  mysql:
    image: mysql:9
    container_name: zapcakes-mysql
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - zapcakes-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  zapcakes-mysql-data:
