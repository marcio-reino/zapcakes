services:
  db:
    image: postgres:17
    container_name: zapcakes-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - evo_db_data:/var/lib/postgresql/data
    networks:
      - default

  redis:
    image: redis:7
    container_name: zapcakes-evolution-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - evo_redis_data:/data
    networks:
      - default

  api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: zapcakes-evolution-api
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      SERVER_TYPE: http
      SERVER_PORT: '8080'
      SERVER_URL: https://evolutionapi.zapcakes.com
      CORS_ORIGIN: '*'
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: 'true'
      LOG_LEVEL: ERROR,WARN,INFO,LOG
      LOG_COLOR: 'true'
      LOG_BAILEYS: error
      EVENT_EMITTER_MAX_LISTENERS: '50'
      DEL_INSTANCE: 'false'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'true'
      DATABASE_SAVE_MESSAGE_UPDATE: 'true'
      DATABASE_SAVE_DATA_CONTACTS: 'true'
      DATABASE_SAVE_DATA_CHATS: 'true'
      DATABASE_SAVE_DATA_LABELS: 'true'
      DATABASE_SAVE_DATA_HISTORIC: 'true'
      DATABASE_SAVE_IS_ON_WHATSAPP: 'true'
      DATABASE_SAVE_IS_ON_WHATSAPP_DAYS: '7'
      DATABASE_DELETE_MESSAGE: 'true'
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_TTL: '604800'
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: 'false'
      CACHE_LOCAL_ENABLED: 'false'
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: 'true'
      WEBHOOK_GLOBAL_ENABLED: 'true'
      WEBHOOK_GLOBAL_URL: https://api.zapcakes.com/api/webhooks/evolution
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: 'false'
      WEBHOOK_EVENTS_APPLICATION_STARTUP: 'false'
      WEBHOOK_EVENTS_QRCODE_UPDATED: 'true'
      WEBHOOK_EVENTS_MESSAGES_SET: 'true'
      WEBHOOK_EVENTS_MESSAGES_UPSERT: 'true'
      WEBHOOK_EVENTS_MESSAGES_EDITED: 'true'
      WEBHOOK_EVENTS_MESSAGES_UPDATE: 'true'
      WEBHOOK_EVENTS_MESSAGES_DELETE: 'true'
      WEBHOOK_EVENTS_SEND_MESSAGE: 'true'
      WEBHOOK_EVENTS_CONTACTS_SET: 'true'
      WEBHOOK_EVENTS_CONTACTS_UPSERT: 'true'
      WEBHOOK_EVENTS_CONTACTS_UPDATE: 'true'
      WEBHOOK_EVENTS_PRESENCE_UPDATE: 'true'
      WEBHOOK_EVENTS_CHATS_SET: 'true'
      WEBHOOK_EVENTS_CHATS_UPSERT: 'true'
      WEBHOOK_EVENTS_CHATS_UPDATE: 'true'
      WEBHOOK_EVENTS_CHATS_DELETE: 'true'
      WEBHOOK_EVENTS_GROUPS_UPSERT: 'true'
      WEBHOOK_EVENTS_GROUPS_UPDATE: 'true'
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: 'true'
      WEBHOOK_EVENTS_CONNECTION_UPDATE: 'true'
      WEBHOOK_EVENTS_REMOVE_INSTANCE: 'false'
      WEBHOOK_EVENTS_LOGOUT_INSTANCE: 'false'
      WEBHOOK_EVENTS_LABELS_EDIT: 'true'
      WEBHOOK_EVENTS_LABELS_ASSOCIATION: 'true'
      WEBHOOK_EVENTS_CALL: 'true'
      WEBHOOK_EVENTS_ERRORS: 'false'
      CONFIG_SESSION_PHONE_CLIENT: Evolution API
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: '30'
      TYPEBOT_ENABLED: 'false'
      CHATWOOT_ENABLED: 'false'
      OPENAI_ENABLED: 'false'
      DIFY_ENABLED: 'false'
      S3_ENABLED: 'false'
      RABBITMQ_ENABLED: 'false'
      SQS_ENABLED: 'false'
      WEBSOCKET_ENABLED: 'false'
      PUSHER_ENABLED: 'false'
      LANGUAGE: en
      TZ: America/Sao_Paulo
      DOCKER_ENV: 'true'
    labels:
      - traefik.enable=true
      - traefik.http.routers.zapcakes-evo.rule=Host(`evolutionapi.zapcakes.com`)
      - traefik.http.routers.zapcakes-evo.entrypoints=websecure
      - traefik.http.routers.zapcakes-evo.tls.certresolver=letsencrypt
      - traefik.http.services.zapcakes-evo.loadbalancer.server.port=8080
    networks:
      - traefik_network
      - default

volumes:
  evo_db_data:
  evo_redis_data:

networks:
  traefik_network:
    external: true
